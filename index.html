<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Website</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            height: 100%;
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle, #fff 0%, rgba(0, 0, 0, 0.5) 200%);
        }

        #app {
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        h1, h2 {
            margin: 0;
            font-family: 'Orbitron', sans-serif;
            color: #f0f0f0;
            text-transform: uppercase;
            text-shadow: 0 0 20px rgba(0, 0, 0, 1);
            letter-spacing: 2px;
        }

        h1 { font-size: 80px; }
        h2 { font-size: 60px; }

        h3 {
            margin: 0;
            font-family: 'Orbitron', sans-serif;
            color: red;
            font-weight: bold;
            font-size: 36px;
            text-align: center;
            position: absolute;
            top: 120px;
            width: 100%;
            z-index: 1000;
            letter-spacing: 4px;
        }

        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 25px 15px;
            background: rgba(0, 0, 0, 0.5);
            text-align: center;
            z-index: 10;
        }

        header h1 {
            color: #f0f0f0;
            font-size: 36px;
            margin: 0;
            text-transform: uppercase;
            text-shadow: 0 0 20px rgba(0, 0, 0, 1);
        }

        h6 {
            margin: 15px 0;
            font-family: 'Orbitron', sans-serif;
            color: #f0f0f0;
            font-weight: bold;
            font-size: 14px;
            text-align: center;
            z-index: 1001;
            padding: 8px 16px;
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 0, 0, 0.2);
            border-radius: 5px;
            display: inline-block;
            min-width: 250px;
            transition: all 0.3s ease;
        }

        h6:hover {
            background-color: rgba(139, 0, 0, 0.7);
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.4);
        }

        a {
            color: #f0f0f0;
            text-decoration: none;
            display: block;
            height: 100%;
        }

        #webgl-canvas {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
        }

        footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 6px 12px;
            background: rgba(0, 0, 0, 0.5);
            text-align: center;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 35px;
        }

        footer p {
            font-family: 'Poppins', sans-serif;
            color: #f0f0f0;
            font-size: 14px;
            font-weight: bold;
            margin: 0;
        }

        #colors-btn-footer {
            position: absolute;
            right: 15px;
            bottom: 6px;
            background: rgba(255, 255, 255, 0.6);
            padding: 6px 10px;
            border-radius: 5px;
            border: none;
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
            font-size: 10px;
            font-weight: bold;
        }

        .links-container {
            position: absolute;
            top: 220px;
            width: 100%;
            text-align: center;
            z-index: 1100;
        }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to my Website</h1>
    </header>

    <h3>Content</h3>

    <div id="app">
        <canvas id="webgl-canvas"></canvas>
    </div>

    <div class="links-container">
        <h6><a href="internet.html">Internet</a></h6>
        <h6><a href="network.html">Network</a></h6>
        <h6><a href="networkapps.html">Network Applications</a></h6>
        <h6><a href="networksecurity.html">Network Security</a></h6>
        <h6><a href="email.html">Email</a></h6>
        <h6><a href="viruses.html">Viruses</a></h6>
        <h6><a href="ecom&itstypes.html">E-com & its types</a></h6>
        <h6><a href="pdlc.html">PDLC</a></h6>
        <h6><a href="multimedia&computergraphics.html">Multimedia & Computer Graphics</a></h6>
        <h6><a href="advancetopics.html">Advance Topics</a></h6>
    </div>

    <footer>
        <p>made by Abdullah Imran | 031</p>
        <button id="colors-btn-footer">Random Colors</button>
    </footer>

    <script type="module">
        import Grid1Background from 'https://cdn.jsdelivr.net/npm/threejs-components@0.0.16/build/backgrounds/grid1.cdn.min.js';

        const bg = Grid1Background(document.getElementById('webgl-canvas'));
        const button = document.getElementById('colors-btn-footer');

        button.addEventListener('click', () => {
            bg.grid.setColors([Math.random() * 0xffffff, Math.random() * 0xffffff, Math.random() * 0xffffff]);
            bg.grid.light1.color.set(Math.random() * 0xffffff);
            bg.grid.light1.intensity = 500 + Math.random() * 1000;
            bg.grid.light2.color.set(Math.random() * 0xffffff);
            bg.grid.light2.intensity = 250 + Math.random() * 250;
        });
    </script>
</body>
</html>
